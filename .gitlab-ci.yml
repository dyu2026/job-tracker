image: python:3.12

stages:
  - scrape

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  key:
    files:
      - requirements.txt
  paths:
    - .cache/pip

before_script:
  - python --version
  - pip install --upgrade pip
  - pip install --disable-pip-version-check -r requirements.txt
  - python -m playwright install --with-deps chromium

scrape_jobs:
  stage: scrape
  timeout: 30m
  script:
    - python scraper.py || echo "SCRAPER FAILED"
  retry:
    max: 1
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
  only:
    - schedules