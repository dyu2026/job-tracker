image: python:3.12

stages:
  - scrape

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  key:
    files:
      - requirements.txt
  paths:
    - .cache/pip

before_script:
  - python --version
  - pip install --upgrade pip
  - pip install --disable-pip-version-check -r requirements.txt
  - apt-get update
  - apt-get install -y wget gnupg ca-certificates libnss3 libatk-bridge2.0-0 libx11-xcb1 libxcb1 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 libasound2 libpangocairo-1.0-0 libatk1.0-0 libcups2 libdrm2 libxkbcommon0 libxshmfence1
  - playwright install chromium

scrape_jobs:
  stage: scrape
  script:
    - python scraper.py
  only:
    - schedules